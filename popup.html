<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Job Help</title>
<style>
  body {
    margin: 0;
    padding: 12px;
    width: 220px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  button {
    width: 100%;
    font: inherit;
    padding: 8px 10px;
    cursor: pointer;
  }
  button:disabled {
    cursor: default;
    opacity: 0.6;
  }
  #status {
    margin-top: 10px;
    color: #444;
    white-space: pre-line;
  }
  a {
    color: inherit;
  }
</style>
</head>
<body>
  <div class="actions">
    <button id="fill-form-btn" type="button">Fill form</button>
    <button id="save-fields-btn" type="button">Save fields</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
