<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Job Help — Settings</title>
<style>
  body {
    margin: 0;
    padding: 16px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    max-width: 480px;
  }
  h1 {
    font-size: 16px;
    margin: 0 0 4px;
  }
  p.hint {
    margin: 0 0 16px;
    color: #555;
    font-size: 13px;
  }
  label {
    display: block;
    margin-bottom: 12px;
  }
  label span {
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    font: inherit;
  }
  button {
    font: inherit;
    padding: 6px 14px;
    cursor: pointer;
  }
  #status {
    margin-left: 10px;
    color: #2a7a2a;
  }
</style>
</head>
<body>
  <h1>Cover letter generator</h1>
  <p class="hint">
    Connects to job-applyer's local <code>cover_letter_server.py</code> (loopback-only,
    requires the token it prints/writes to its own <code>.env</code> on first run).
  </p>

  <form id="settings-form">
    <label>
      <span>Server URL</span>
      <input type="text" id="server-url" placeholder="http://127.0.0.1:8743">
    </label>
    <label>
      <span>API token</span>
      <input type="password" id="token" placeholder="COVER_LETTER_SERVER_TOKEN value" autocomplete="off">
    </label>
    <button type="submit">Save</button>
    <span id="status"></span>
  </form>

  <script src="options.js"></script>
</body>
</html>
