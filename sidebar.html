<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Job Help</title>
<link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <section class="status">
    <p id="job-status">Checking current page…</p>
  </section>

  <section class="actions">
    <button id="save-job-btn" type="button" disabled>Save Job</button>
    <button id="save-questions-btn" type="button" disabled>Save Application Questions</button>
    <button id="download-btn" type="button">Download jobs</button>
  </section>

  <section class="saved-list">
    <div class="saved-list-header">
      <h2 id="saved-jobs-heading">No jobs saved</h2>
      <button id="clear-jobs-btn" type="button" class="clear-btn" hidden>Clear all</button>
    </div>
    <ul id="saved-jobs-list"></ul>
  </section>

  <section class="saved-list">
    <div class="saved-list-header">
      <h2 id="saved-questions-heading">No questions saved</h2>
      <button id="clear-questions-btn" type="button" class="clear-btn" hidden>Clear all</button>
    </div>
    <ul id="saved-questions-list"></ul>
  </section>

  <script src="shared/storage.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
